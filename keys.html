<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Instructor Keys · Computation 101</title>
<style>
  :root{--gold:#CFB87C;--gold-dark:#a8925a;--ink:#15181d;--bg:#f7f6f2;--card:#fff;--gray:#5b6068;
    --line:#e5e2d9;--term-bg:#0d1117;--term-border:#2d333b;--term-green:#3fb950;--term-text:#c9d1d9;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.6}
  #gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;
    background:linear-gradient(180deg,#0d1117,#161b22)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:2rem 1.8rem;max-width:26rem;width:100%;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.35)}
  .kick{font-family:var(--mono);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-dark);margin-bottom:.5rem}
  .card h1{font-size:1.5rem;letter-spacing:-.01em;margin-bottom:.5rem}
  .card .sub{color:var(--gray);font-size:.86rem;margin-bottom:1.2rem}
  #f{display:flex;gap:.5rem}
  #pw{flex:1;font-family:var(--mono);font-size:.9rem;padding:.6rem .8rem;border:1px solid var(--line);border-radius:9px;background:#fffdf7}
  #pw:focus{outline:2px solid var(--gold)}
  #f button{font-family:var(--mono);font-weight:700;font-size:.85rem;background:var(--gold);border:1px solid var(--gold);color:#1d1d1d;border-radius:9px;padding:.6rem 1.1rem;cursor:pointer}
  #f button:hover{filter:brightness(1.05)}
  #f button:disabled{opacity:.5;cursor:not-allowed}
  .err{color:#b23434;font-size:.82rem;min-height:1.2em;margin-top:.7rem}
  .content{display:none;max-width:60rem;margin:0 auto;padding:2rem 1.4rem 4rem}
  .content.show{display:block}
  .kbanner{background:var(--term-bg);color:#e6edf3;border-radius:12px;padding:1.4rem 1.5rem;margin-bottom:1.6rem}
  .kbanner h1{font-size:1.5rem;color:var(--gold)}
  .kbanner p{color:#adb4bc;font-size:.86rem;margin-top:.4rem}
  .kws{font-size:1.1rem;color:var(--gold-dark);border-bottom:2px solid var(--line);padding-bottom:.35rem;margin:1.8rem 0 .8rem}
  .kkey{background:var(--card);border:1px solid var(--line);border-radius:11px;margin-bottom:.8rem;overflow:hidden}
  .kkey>summary{cursor:pointer;font-weight:700;padding:.8rem 1.1rem;user-select:none;font-size:.98rem;list-style:none}
  .kkey>summary::-webkit-details-marker{display:none}
  .kkey>summary::before{content:'▶ ';color:var(--gold-dark);font-size:.7rem}
  .kkey[open]>summary::before{content:'▼ '}
  .kkey[open]>summary{border-bottom:1px solid var(--line);background:#faf8f2}
  .kq{font-family:var(--mono);font-size:.66rem;color:var(--gray);font-weight:400;margin-left:.4rem}
  .kbody{padding:1rem 1.2rem}
  .kmd h2{font-size:1.15rem;margin:.8rem 0 .3rem} .kmd h3{font-size:1rem;margin:.7rem 0 .3rem}
  .kmd h4{font-size:.9rem;margin:.6rem 0 .3rem;color:var(--gray)}
  .kmd p{font-size:.9rem;margin:.35rem 0} .kmd ul{margin:.3rem 0 .5rem 1.2rem;font-size:.9rem}
  .kmd blockquote{border-left:3px solid var(--gold);background:#faf8f2;padding:.4rem .8rem;margin:.5rem 0;font-size:.88rem;color:#444}
  .kmd code,.knl code{font-family:var(--mono);font-size:.82em;background:#efece3;border-radius:4px;padding:.05em .35em}
  pre.kcode{background:var(--term-bg);color:var(--term-text);font-family:var(--mono);font-size:.8rem;line-height:1.5;
    padding:.75rem .9rem;border-radius:8px;overflow-x:auto;margin:.5rem 0;white-space:pre;border:1px solid var(--term-border)}
  .knote{border:1px solid #d8c89a;background:#fbf6e7;border-radius:9px;padding:.6rem .85rem;margin:.2rem 0 .9rem}
  .knh{font-family:var(--mono);font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-dark);font-weight:700}
  .knl{font-size:.86rem;margin-top:.4rem}
  .knl pre{font-family:var(--mono);font-size:.8rem;background:#fff;border:1px solid #e7dcc0;border-radius:6px;padding:.4rem .6rem;margin:.25rem 0 0;white-space:pre-wrap;color:#7a5c12}
  .signout{display:block;margin:1.5rem auto 0;font-family:var(--mono);font-size:.72rem;color:var(--gray);background:none;border:1px solid var(--line);border-radius:7px;padding:.4rem .8rem;cursor:pointer}
</style>
</head>
<body>
<div id="gate">
  <div class="card">
    <p class="kick">Computation 101 · Restricted</p>
    <h1>Instructor Answer Keys</h1>
    <p class="sub">Enter the instructor passphrase. Decryption happens entirely in your browser — nothing is uploaded, and the answers are not present in this page until unlocked.</p>
    <form id="f" autocomplete="off">
      <input id="pw" type="password" placeholder="passphrase" autocomplete="off" autofocus>
      <button id="go" type="submit">Unlock</button>
    </form>
    <p id="err" class="err" role="status" aria-live="polite"></p>
  </div>
</div>
<div id="content" class="content"></div>

const b64d = (s) => { const bin = atob(s); const u = new Uint8Array(bin.length); for (let i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i); return u; };
async function decryptWith(pass){
  const salt=b64d(BUNDLE.salt), iv=b64d(BUNDLE.iv), ct=b64d(BUNDLE.ct);
  const base=await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:BUNDLE.iter,hash:'SHA-256'}, base, {name:'AES-GCM',length:256}, false, ['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv}, key, ct);
  return new TextDecoder().decode(pt);
}
const f=document.getElementById('f'), pw=document.getElementById('pw'), err=document.getElementById('err'), go=document.getElementById('go');
f.addEventListener('submit', async (e)=>{
  e.preventDefault();
  err.textContent=''; go.disabled=true; go.textContent='Unlocking…';
  try{
    const html=await decryptWith(pw.value);
    const c=document.getElementById('content');
    c.innerHTML=html + '<button class="signout" onclick="location.reload()">lock again</button>';
    document.getElementById('gate').style.display='none';
    c.classList.add('show');
    document.title='Instructor Keys (unlocked) · Computation 101';
  }catch(ex){
    err.textContent='Wrong passphrase — try again.';
    go.disabled=false; go.textContent='Unlock'; pw.select();
  }
});
</script>
